apps:
  goddess_secret: "change-me"
  goddess_websocket_url: "ws://localhost:20090/ws"

storage:
  provider: "s3"
  endpoint: "http://localhost:9000"
  region: "us-east-1"
  access_key_id: "mygod"
  secret_access_key: "change-me"
  force_path_style: true
