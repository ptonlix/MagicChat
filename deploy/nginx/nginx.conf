worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;
  error_log /var/log/nginx/error.log warn;

  sendfile on;
  keepalive_timeout 65;
  server_tokens off;
  client_max_body_size 20m;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  upstream dianbao_server {
    server server:20080;
    keepalive 32;
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate /etc/nginx/certs/client.crt;
    ssl_certificate_key /etc/nginx/certs/client.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /usr/share/nginx/client;
    index index.html;

    location = /nginx-healthz {
      access_log off;
      return 200 "ok\n";
    }

    location /api/client/ws {
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 90s;
      proxy_send_timeout 90s;
      proxy_pass http://dianbao_server;
    }

    location /api/client/ {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://dianbao_server;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }

  server {
    listen 8443 ssl;
    http2 on;
    server_name _;

    ssl_certificate /etc/nginx/certs/admin.crt;
    ssl_certificate_key /etc/nginx/certs/admin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /usr/share/nginx/admin;
    index index.html;

    location = /nginx-healthz {
      access_log off;
      return 200 "ok\n";
    }

    location /api/admin/ {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://dianbao_server;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
