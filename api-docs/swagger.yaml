info:
  contact: {}
  description: 私有部署企业协作产品的服务端 API。当前阶段包含管理员登录、管理员创建普通用户、普通用户登录。
  title: AI 原生企业协作服务 API
  version: 0.1.0
paths:
  /api/admin/apps:
    get:
      description: 管理员读取应用配置，包含连接密钥和连接状态。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpserver.successEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/httpserver.listAdminAppsResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
      summary: 列出应用
      tags:
      - 管理员应用
    post:
      consumes:
      - application/json
      description: 管理员创建一个应用配置。连接密钥由服务端生成。
      parameters:
      - description: 应用配置
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpserver.adminAppRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/httpserver.successEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/httpserver.adminAppEnvelope'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
      summary: 创建应用
      tags:
      - 管理员应用
  /api/admin/apps/{id}:
    delete:
      description: 管理员删除普通应用。AI 女菩萨不能删除。
      parameters:
      - description: 应用 ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpserver.successEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
      summary: 删除应用
      tags:
      - 管理员应用
    put:
      consumes:
      - application/json
      description: 管理员更新一个应用配置。AI 女菩萨的可见范围固定为所有人。
      parameters:
      - description: 应用 ID
        in: path
        name: id
        required: true
        type: string
      - description: 应用配置
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpserver.adminAppRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpserver.successEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/httpserver.adminAppEnvelope'
              type: object
        "400":
