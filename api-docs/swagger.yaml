info:
  contact: {}
  description: 私有部署企业协作产品的服务端 API。当前阶段包含管理员登录、管理员创建普通用户、普通用户登录。
  title: AI 原生企业协作服务 API
  version: 0.1.0
paths:
  /api/admin/assistant/models:
    get:
      description: 管理员读取 MyGod 助手的大模型配置，包含 API Key 和健康检查状态。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpserver.successEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/httpserver.listLLMModelsResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
      summary: 列出大模型配置
      tags:
      - 管理员 MyGod 助手
    post:
      consumes:
      - application/json
      description: 管理员创建一个 Anthropic 协议的大模型配置。
      parameters:
      - description: 大模型配置
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpserver.llmModelRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/httpserver.successEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/httpserver.llmModelEnvelope'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
      summary: 创建大模型配置
      tags:
      - 管理员 MyGod 助手
  /api/admin/assistant/models/{id}:
    delete:
      description: 管理员删除一个大模型配置。
      parameters:
      - description: 大模型 ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpserver.successEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
      summary: 删除大模型配置
      tags:
      - 管理员 MyGod 助手
    put:
      consumes:
      - application/json
      description: 管理员更新一个大模型配置。API Key 每次更新都需要提交完整值，配置更新后健康状态会重置为未检测。
      parameters:
      - description: 大模型 ID
        in: path
        name: id
        required: true
        type: string
      - description: 大模型配置
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpserver.llmModelRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpserver.successEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/httpserver.llmModelEnvelope'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
      summary: 更新大模型配置
      tags:
      - 管理员 MyGod 助手
  /api/admin/assistant/models/{id}/disable:
    post:
      description: 管理员禁用一个大模型配置。
      parameters:
      - description: 大模型 ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpserver.successEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/httpserver.llmModelEnvelope'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
      summary: 禁用大模型配置
      tags:
      - 管理员 MyGod 助手
  /api/admin/assistant/models/{id}/enable:
    post:
      description: 管理员启用一个大模型配置。
      parameters:
      - description: 大模型 ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpserver.successEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/httpserver.llmModelEnvelope'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
      summary: 启用大模型配置
      tags:
      - 管理员 MyGod 助手
  /api/admin/assistant/models/{id}/health-check:
    post:
      description: 管理员主动发起一次 Anthropic 非流式健康检查，并返回更新后的健康状态。
      parameters:
      - description: 大模型 ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpserver.successEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/httpserver.llmModelEnvelope'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
      summary: 主动检测大模型连接
      tags:
      - 管理员 MyGod 助手
  /api/admin/assistant/models/{id}/move:
    post:
      consumes:
      - application/json
      description: 管理员将一个大模型配置上移或下移，服务端会重新归一化所有配置的排序值。
      parameters:
      - description: 大模型 ID
        in: path
        name: id
        required: true
        type: string
      - description: 移动方向
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpserver.llmModelMoveRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpserver.successEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/httpserver.listLLMModelsResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
      summary: 移动大模型配置
      tags:
      - 管理员 MyGod 助手
  /api/admin/assistant/models/discover:
    post:
      consumes:
      - application/json
      description: 管理员用临时 Base URL 和 API Key 读取 Anthropic 协议的大模型列表，不会保存配置。
      parameters:
      - description: Anthropic 临时连接信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpserver.discoverLLMModelsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpserver.successEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/httpserver.discoverLLMModelsResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/httpserver.errorEnvelope'
      summary: 读取 Anthropic 大模型列表
      tags:
      - 管理员 MyGod 助手
  /api/admin/auth/login:
    post:
      consumes:
      - application/json
      description: 默认管理员账号固定为 admin，密码来自服务端配置。
      parameters:
      - description: 登录参数
        in: body
