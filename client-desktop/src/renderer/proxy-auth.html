<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; form-action 'none'; base-uri 'none'" />
    <title>代理认证</title>
    <style>body{margin:0;background:#fafafa;color:#18181b;font:14px system-ui}main{padding:22px}h1{font-size:18px;margin:0 0 8px}p{color:#52525b;margin:0 0 18px}form{display:grid;gap:13px}label{display:grid;gap:6px;font-size:13px}input{border:1px solid #a1a1aa;border-radius:5px;height:36px;padding:0 9px;font:inherit}.buttons{display:flex;gap:8px;justify-content:flex-end;margin-top:5px}button{border:1px solid #a1a1aa;border-radius:5px;background:#fff;height:34px;padding:0 12px}button[type=submit]{background:#18181b;color:#fff;border-color:#18181b}</style>
  </head>
  <body><main><h1>代理服务器需要认证</h1><p>凭据仅用于本次连接，不会保存到普通配置。</p><form id="form"><label>用户名<input id="username" maxlength="256" autocomplete="username" required /></label><label>密码<input id="password" maxlength="1024" type="password" autocomplete="current-password" required /></label><div class="buttons"><button id="cancel" type="button">取消</button><button type="submit">连接</button></div></form></main><script type="module" src="/proxy-auth.ts"></script></body>
</html>
