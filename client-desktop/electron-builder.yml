appId: com.magicchat.desktop
productName: MagicChat
artifactName: "MagicChat-${version}-${os}-${arch}.${ext}"
asar: true
afterPack: scripts/after-pack.mjs
directories:
  output: dist
  buildResources: resources
extraResources:
  - from: public/logo.png
    to: logo.png
files:
  - out/**/*
  - package.json
extraMetadata:
  description: MagicChat 三平台桌面客户端测试构建
protocols:
  - name: MagicChat
    schemes:
      - magicchat
publish:
  provider: github
  owner: magicchat
  repo: magicchat
  releaseType: draft
win:
  icon: public/logo.png
  target:
    - target: nsis
      arch: [x64, arm64]
  signAndEditExecutable: false
  verifyUpdateCodeSignature: false
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
mac:
  icon: public/logo.png
  extendInfo:
    NSAppTransportSecurity:
      NSAllowsArbitraryLoads: false
      NSAllowsLocalNetworking: false
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  identity: null
  minimumSystemVersion: "22.0.0"
linux:
  icon: public/logo.png
  category: Network;Chat
  target:
    - target: AppImage
      arch: [x64, arm64]
    - target: deb
      arch: [x64, arm64]
  desktop:
    entry:
      StartupWMClass: MagicChat
      MimeType: x-scheme-handler/magicchat;
