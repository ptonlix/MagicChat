name: Docker Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache-dependency-path: |
            server/go.sum
            goddess-server/go.sum

      - name: Test server
        working-directory: server
        run: go test ./...

      - name: Test goddess server
        working-directory: goddess-server
        run: go test ./...

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            client-web/pnpm-lock.yaml
            admin-web/pnpm-lock.yaml

      - name: Verify client web
        working-directory: client-web
        run: |
          pnpm install --frozen-lockfile
          pnpm test
          pnpm typecheck
          pnpm lint
          pnpm build

      - name: Verify admin web
        working-directory: admin-web
        run: |
          pnpm install --frozen-lockfile
          pnpm test
          pnpm typecheck
          pnpm lint
          pnpm build

      - name: Verify deploy config
        run: scripts/verify-deploy-config.sh

  build:
    name: Build and Push
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: server
            dockerfile: server/Dockerfile
          - image: goddess-server
            dockerfile: goddess-server/Dockerfile
          - image: nginx
            dockerfile: deploy/nginx/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Normalize image namespace
        run: echo "IMAGE_NAMESPACE=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
